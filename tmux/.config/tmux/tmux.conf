# ══════════════════════════════════════════════════════
# TMUX CONFIG — GRUVBOX DARK HARD
# ══════════════════════════════════════════════════════

# ── Prefix key ─────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General settings ───────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"  # true color support
set -g mouse on                               # enable mouse support
set -g base-index 1                           # windows start at 1, not 0
setw -g pane-base-index 1                     # panes start at 1 too
set -g renumber-windows on                    # renumber windows when one closes
set -g escape-time 0                          # no delay for escape key (matters for vim)
set -g history-limit 10000                    # scrollback buffer size
set -g focus-events on                        # needed for vim autoread

# ── Window/Pane splitting ──────────────────────────────
# more intuitive split keys, and open in the same directory
unbind '"'
unbind %
bind '\' split-window -h -c "#{pane_current_path}"   # vertical split
bind - split-window -v -c "#{pane_current_path}"     # horizontal split
bind c new-window -c "#{pane_current_path}"           # new window in same dir

# ── Navigation ──────────────────────────────────────────
# switch panes with vim-like keys (Prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# switch windows like VS Code tabs — Alt+1, Alt+2, etc. (no prefix needed!)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# cycle through windows like Ctrl+Tab in VS Code
bind -n M-Right next-window
bind -n M-Left previous-window

# ── Resizing panes ──────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ───────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── Copy mode (vim-like) ────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ══════════════════════════════════════════════════════
# GRUVBOX DARK HARD THEME
# ══════════════════════════════════════════════════════

# Colors
set -g status-bg "#1d2021"
set -g status-fg "#ebdbb2"
set -g status-style "bg=#1d2021,fg=#ebdbb2"

# Status bar layout
set -g status-left-length 40
set -g status-right-length 60
set -g status-position top
set -g status-justify left

set -g status-left "#[bg=#fabd2f,fg=#1d2021,bold] #S #[bg=#1d2021,fg=#fabd2f]"

set -g status-right "#[fg=#83a598]#[bg=#83a598,fg=#1d2021] %H:%M #[bg=#1d2021,fg=#83a598]"

# Window status (the "tabs")
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#504945,fg=#fabd2f,bold] #I:#W #[bg=#1d2021,fg=#504945]"
setw -g window-status-style "fg=#a89984"
setw -g window-status-current-style "fg=#fabd2f"
setw -g window-status-activity-style "fg=#fb4934"

# Pane borders
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#83a598"

# Message style (when you see command prompts at the bottom)
set -g message-style "bg=#504945,fg=#ebdbb2"
set -g message-command-style "bg=#504945,fg=#ebdbb2"

# Clock mode color
set -g clock-mode-colour "#83a598"
