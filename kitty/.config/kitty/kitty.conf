# ══════════════════════════════════════════════════════
# KITTY CONFIG — GRUVBOX DARK HARD
# ~/.config/kitty/kitty.conf
# ══════════════════════════════════════════════════════

# ── Font ───────────────────────────────────────────────
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 11.0

# fine tune glyph position — same offsets as the alacritty config
modify_font cell_height 100%
modify_font baseline 0

# ── Cursor ─────────────────────────────────────────────
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 0
cursor_text_color #1d2021

# ── Scrollback ─────────────────────────────────────────
scrollback_lines 10000
wheel_scroll_min_lines 1

# ── Mouse ──────────────────────────────────────────────
mouse_hide_wait 3.0
copy_on_select no
strip_trailing_spaces smart

# ── Window layout ──────────────────────────────────────
window_padding_width 6 5
hide_window_decorations no
confirm_os_window_close 0
draw_minimal_borders yes
window_border_width 1pt
single_window_margin_width -1

# ── Background opacity ─────────────────────────────────
background_opacity 1.0
dynamic_background_opacity no

# ── Tab bar ────────────────────────────────────────────
tab_bar_style hidden

# ── Bell ───────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no

# ── Performance ────────────────────────────────────────
repaint_delay 8
input_delay 2
sync_to_monitor yes

# ── Shell integration ──────────────────────────────────
shell_integration enabled

# ── Allow remote control (useful for scripting/fastfetch) ─
allow_remote_control yes
listen_on unix:/tmp/kitty

# ══════════════════════════════════════════════════════
# GRUVBOX DARK HARD COLOR SCHEME
# ══════════════════════════════════════════════════════

foreground            #ebdbb2
background            #282828
selection_foreground  #ebdbb2
selection_background  #504945

# Cursor colors
cursor                #ebdbb2
cursor_text_color     #1d2021

# URL underline color
url_color             #83a598

# Border colors
active_border_color   #83a598
inactive_border_color #3c3836
bell_border_color      #fb4934

# Tab bar colors
active_tab_foreground   #1d2021
active_tab_background   #fabd2f
inactive_tab_foreground #a89984
inactive_tab_background #3c3836
tab_bar_background      #1d2021

# Normal colors
color0  #1d2021
color1  #cc241d
color2  #98971a
color3  #d79921
color4  #458588
color5  #b16286
color6  #689d6a
color7  #a89984

# Bright colors
color8  #928374
color9  #fb4934
color10 #b8bb26
color11 #fabd2f
color12 #83a598
color13 #d3869b
color14 #8ec07c
color15 #ebdbb2

# Extended colors (for 256-color support, dim variants)
color16 #d65d0e
color17 #fe8019

# ── Marks (useful for searching scrollback) ────────────
mark1_foreground #1d2021
mark1_background #fabd2f

# ── Include any host-specific overrides ────────────────
# (kept separate so this file stays identical on desktop/laptop)
include kitty.local.conf
